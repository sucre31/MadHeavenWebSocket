<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>WebSocket 投票テスト</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .stats { background: #f0f0f0; padding: 15px; border-radius: 8px; }
        .user-list { margin-top: 10px; }
        .user-item { border-bottom: 1px solid #ccc; padding: 5px 0; }
    </style>
</head>
<body>
    <h1>WebSocket リアルタイム投票</h1>
    
    <button id="voteBtn" style="padding: 10px 20px; font-size: 16px; cursor: pointer;">
        投票する！
    </button>

    <div class="stats" style="margin-top: 20px;">
        <h3>合計投票数: <span id="total">0</span></h3>
        <div id="status">接続中...</div>
        
        <h4>ユーザー別内訳:</h4>
        <div id="details" class="user-list"></div>
    </div>

    <script>
        // サーバーに接続 (ポート番号はNode.js側と合わせる)
        const socket = new WebSocket('wss://madheavenwebsocket.onrender.com');

        const voteBtn = document.getElementById('voteBtn');
        const totalSpan = document.getElementById('total');
        const detailsDiv = document.getElementById('details');
        const statusDiv = document.getElementById('status');

        // 接続完了時
        socket.onopen = () => {
            statusDiv.innerText = "状態: 接続済み";
            statusDiv.style.color = "green";
        };

        // メッセージ受信時
        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            // 合計を表示
            totalSpan.innerText = data.totalVotes;

            // 内訳をリスト表示
            detailsDiv.innerHTML = '';
            data.details.forEach(user => {
                const item = document.createElement('div');
                item.className = 'user-item';
                item.innerText = `ID: ${user.id} — ${user.votes} 票`;
                detailsDiv.appendChild(item);
            });
        };

        // 接続終了時
        socket.onclose = () => {
            statusDiv.innerText = "状態: 切断されました";
            statusDiv.style.color = "red";
        };

        // ボタンクリックでサーバーへ送信
        voteBtn.onclick = () => {
            if (socket.readyState === WebSocket.OPEN) {
                socket.send('vote');
            }
        };
    </script>
</body>
</html>
