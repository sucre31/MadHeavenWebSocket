<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebSocket 熱量測定</title>
    <style>
        /* スマホでのスクロールとダブルタップズームを完全に禁止 */
        html, body {
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            touch-action: none; /* スクロールやピンチズームを無効化 */
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            justify-content: center; /* 中央配置 */
            background-color: #f8f9fc;
            transition: background-color 0.2s;
            gap: 30px; /* 要素間のスペースを広めに */
        }

        /* BURST時の演出 */
        body.burst-effect {
            background-color: #ff4757;
        }

        h1 {
            margin: 0;
            font-size: 28px;
            color: #2f3542;
            letter-spacing: 1px;
        }

        /* ゲージ周り */
        .gauge-section {
            width: 85%;
            max-width: 400px;
        }

        .gauge-container {
            width: 100%;
            height: 35px;
            background-color: #e0e6ed;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
            border: 1px solid #dcdde1;
        }

        #heatBar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff9f43, #ff4757);
            transition: width 0.2s ease-out;
            box-shadow: 0 0 10px rgba(255, 71, 87, 0.3);
        }

        #thresholdLabel {
            font-size: 13px;
            color: #7f8c8d;
            text-align: right;
            margin-top: 8px;
            font-weight: bold;
        }

        /* 投票ボタン */
        #voteBtn {
            touch-action: manipulation; 
            padding: 25px 60px;
            font-size: 26px;
            font-weight: 800;
            color: #fff;
            background-color: #ff4757;
            border: none;
            border-radius: 50px; /* 丸みを持たせる */
            cursor: pointer;
            box-shadow: 0 8px 0 #c0392b;
            transition: all 0.05s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #voteBtn:active {
            box-shadow: 0 0px #c0392b;
            transform: translateY(8px);
        }

        /* 統計カード */
        .stats-card { 
            width: 85%;
            max-width: 400px;
            background: #fff; 
            padding: 25px; 
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .heat-main {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 20px;
        }

        #totalHeat { font-size: 32px; font-weight: bold; color: #ff4757; }
        #ratioText { font-size: 20px; color: #57606f; }

        #status { font-size: 12px; color: #a4b0be; text-align: center; margin-top: 10px; }

        .user-list { 
            margin-top: 15px;
            max-height: 120px; /* リストが増えてもはみ出さないように */
            overflow-y: auto;
        }

        .user-item { 
            display: flex; 
            justify-content: space-between; 
            border-bottom: 1px solid #f1f2f6; 
            padding: 10px 0; 
            font-size: 14px;
            color: #2f3542;
        }
    </style>
</head>
<body>
    <div id="status">サーバーに接続しています...</div>

    <h1>HEAT METER</h1>

    <div class="gauge-section">
        <div class="gauge-container">
            <div id="heatBar"></div>
        </div>
        <div id="thresholdLabel">BURST: --%</div>
    </div>

    <button id="voteBtn">BOOST!</button>

    <div class="stats-card">
        <div class="heat-main">
            <span id="totalHeat">0.0</span>
            <span id="ratioText">0%</span>
        </div>
        
        <div style="border-top: 2px solid #f1f2f6; padding-top: 15px;">
            <div id="details" class="user-list"></div>
        </div>
    </div>

    <script>
        const socket = new WebSocket('wss://madheavenwebsocket.onrender.com');
        const voteBtn = document.getElementById('voteBtn');
        const totalSpan = document.getElementById('totalHeat');
        const ratioText = document.getElementById('ratioText');
        const heatBar = document.getElementById('heatBar');
        const thresholdLabel = document.getElementById('thresholdLabel');
        const detailsDiv = document.getElementById('details');
        const statusDiv = document.getElementById('status');

        let currentThreshold = 0.6; // デフォルト

        socket.onopen = () => {
            statusDiv.innerText = "● ONLINE";
            statusDiv.style.color = "#2ecc71";
            socket.send(JSON.stringify({ type: 'REGISTER', role: 'player' }));
        };

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);

            // 1. 設定情報の更新
            if (data.type === 'CONFIG') {
                currentThreshold = data.threshold;
                thresholdLabel.innerText = `BURST: ${(currentThreshold * 100).toFixed(0)}%`;
                return;
            }

            // 2. 熱量表示の更新
            totalSpan.innerText = data.totalHeat.toFixed(1);
            const ratio = data.heatRatio || 0;
            const ratioPercent = (ratio * 100).toFixed(1);
            ratioText.innerText = ratioPercent + "%";

            // ゲージ表示（閾値に対してどのくらい溜まっているかを見せるなら ratio / currentThreshold にする）
            // ここでは全体の100%に対する割合で表示
            heatBar.style.width = Math.min(ratioPercent, 100) + "%";

            // 3. BURST演出
            if (data.type === 'BURST') {
                triggerBurstEffect();
            }

            // 4. リスト更新
            detailsDiv.innerHTML = '';
            data.details.forEach(user => {
                const item = document.createElement('div');
                item.className = 'user-item';
                item.innerHTML = `<span>ID: ${user.id}</span> <strong>${user.heat.toFixed(1)}</strong>`;
                detailsDiv.appendChild(item);
            });
        };

        function triggerBurstEffect() {
            document.body.classList.add('burst-effect');
            // モバイルのバイブレーション（対応機種のみ）
            if (navigator.vibrate) navigator.vibrate(200);
            
            setTimeout(() => {
                document.body.classList.remove('burst-effect');
            }, 500);
        }

        socket.onclose = () => {
            statusDiv.innerText = "○ OFFLINE";
            statusDiv.style.color = "#e74c3c";
            voteBtn.disabled = true;
            voteBtn.style.backgroundColor = "#ccc";
        };

        voteBtn.onclick = () => {
            if (socket.readyState === WebSocket.OPEN) {
                socket.send('boost');
            }
        };
    </script>
</body>
</html>
